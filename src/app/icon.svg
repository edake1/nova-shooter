<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#050510"/>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="24" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
  <!-- Nova burst rays -->
  <g opacity="0.7">
    <line x1="32" y1="4" x2="32" y2="18" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="46" x2="32" y2="60" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="32" x2="18" y2="32" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="46" y1="32" x2="60" y2="32" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="12.2" y1="12.2" x2="21.1" y2="21.1" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    <line x1="42.9" y1="42.9" x2="51.8" y2="51.8" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    <line x1="51.8" y1="12.2" x2="42.9" y2="21.1" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    <line x1="21.1" y1="42.9" x2="12.2" y2="51.8" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Core star -->
  <circle cx="32" cy="32" r="10" fill="url(#g2)"/>
  <circle cx="32" cy="32" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="32" cy="32" r="3" fill="#22d3ee"/>
  <!-- Gradient defs -->
  <defs>
    <linearGradient id="g1" x1="8" y1="8" x2="56" y2="56">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="g2" cx="32" cy="32" r="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
</svg>
